<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#000"/>
  <!-- Diamond / compass shape: H for Horizon -->
  <polygon points="16,4 28,16 16,28 4,16" fill="none" stroke="url(#g1)" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3" fill="url(#g1)"/>
  <!-- Horizon line -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="url(#g1)" stroke-width="1" opacity="0.5"/>
</svg>
